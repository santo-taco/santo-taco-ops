<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santo Taco — Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #D2E7CD;
    --green: #A4D99B;
    --dark: #1a1f1a;
    --mid: #2e352e;
    --text: #e8f0e8;
    --muted: #7a9478;
    --high: #e07070;
    --low: #7aace0;
    --ok: #A4D99B;
    --warn: #e0b870;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 32px 40px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid #2e352e;
    padding-bottom: 24px;
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--mint);
  }

  .wordmark span {
    color: var(--muted);
    font-style: italic;
  }

  .last-updated {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .last-updated strong {
    color: var(--text);
    display: block;
    font-size: 13px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 24px 40px 0;
  }

  .tab {
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--mid);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: none;
    position: relative;
    top: 1px;
  }

  .tab:hover { color: var(--text); border-color: var(--muted); }

  .tab.active {
    background: var(--mid);
    color: var(--mint);
    border-color: var(--muted);
  }

  /* ── Content ── */
  .tab-content {
    display: none;
    padding: 32px 40px;
    border-top: 1px solid var(--mid);
  }

  .tab-content.active { display: block; }

  /* ── Loading / error states ── */
  .state-msg {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--mid);
    border-top-color: var(--mint);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: var(--high); }

  /* ── Table ── */
  .sheet-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .sheet-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--mid);
    color: var(--mint);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    font-weight: 500;
    position: sticky;
    top: 0;
  }

  .sheet-table td {
    padding: 7px 12px;
    border-bottom: 1px solid #242a24;
    color: var(--text);
    white-space: nowrap;
    font-size: 12px;
  }

  .sheet-table tr:hover td { background: #222822; }

  /* Row coloring */
  .row-header td {
    background: #283028;
    color: var(--mint);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .row-total td {
    background: #1e261e;
    color: var(--green);
    font-weight: 500;
    border-top: 1px solid var(--mid);
    border-bottom: 1px solid var(--mid);
  }

  .row-empty td { height: 16px; border: none; background: transparent; }

  /* Flag pills */
  .flag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .flag-HIGH { background: rgba(224,112,112,0.15); color: var(--high); border: 1px solid rgba(224,112,112,0.3); }
  .flag-LOW  { background: rgba(122,172,224,0.15); color: var(--low);  border: 1px solid rgba(122,172,224,0.3); }
  .flag-OK   { background: rgba(164,217,155,0.12); color: var(--ok);   border: 1px solid rgba(164,217,155,0.25); }

  /* ── Sheet tabs (sub-tabs for worksheet tabs) ── */
  .sheet-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .sheet-tab {
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--mid);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .sheet-tab:hover { color: var(--text); }
  .sheet-tab.active { background: var(--mid); color: var(--mint); border-color: var(--muted); }

  .worksheet { display: none; }
  .worksheet.active { display: block; }

  /* ── Table wrapper ── */
  .table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 280px);
    border: 1px solid var(--mid);
    border-radius: 2px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── Source link ── */
  .source-link {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
  }
  .source-link a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid #3a443a;
  }
  .source-link a:hover { color: var(--mint); border-color: var(--mint); }

  /* ── Number formatting ── */
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: var(--ok); }
  .neg { color: var(--high); }
</style>
</head>
<body>

<header>
  <div class="wordmark">Santo Taco <span>/ ops</span></div>
  <div class="last-updated" id="last-updated">Loading…</div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="switchTab('labor')">Labor</button>
  <button class="tab" onclick="switchTab('cogs')">COGS</button>
  <button class="tab" onclick="switchTab('menu')">Menu Engineering</button>
</nav>

<!-- ── LABOR ── -->
<div id="tab-labor" class="tab-content active">
  <div id="labor-content"><div class="state-msg"><div class="spinner"></div>Loading labor data…</div></div>
  <div class="source-link" id="labor-link"></div>
</div>

<!-- ── COGS ── -->
<div id="tab-cogs" class="tab-content">
  <div id="cogs-content"><div class="state-msg"><div class="spinner"></div>Loading COGS data…</div></div>
  <div class="source-link" id="cogs-link"></div>
</div>

<!-- ── MENU ENGINEERING ── -->
<div id="tab-menu" class="tab-content">
  <div id="menu-content"><div class="state-msg"><div class="spinner"></div>Loading menu data…</div></div>
  <div class="source-link" id="menu-link"></div>
</div>

<script>
// ── Sheet IDs ──────────────────────────────────────────────────────────────────
const SHEETS = {
  labor: { id: '1qEh_bnAX9JzvZNKPiUUQt-5Kc6Pk2K6SxRzz9e4gcnk', label: 'Labor Check' },
  cogs:  { id: '1FmjJqxwxZz4FmosAqC7H2L7S-tTczjzWnUQURaLN7rg', label: 'COGS Deep Dive' },
  menu:  { id: '1dyxWXbuGfCawxUYgO8aJicc34JbDWPp9eTfo1Zh6UaU', label: 'Menu Engineering' },
};

const API_KEY = 'AIzaSyBfRG-cpHyrBkjN3JSD4psoJz1l3ooiF90'; // see note below

// ── Tab switching ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Fetch a sheet's data via the Sheets API ────────────────────────────────────
async function fetchSheet(sheetId, apiKey) {
  // Step 1: get sheet metadata (list of tabs)
  const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?key=${apiKey}&fields=sheets.properties`;
  const metaRes = await fetch(metaUrl);
  if (!metaRes.ok) throw new Error(`HTTP ${metaRes.status}: ${await metaRes.text()}`);
  const meta = await metaRes.json();
  const sheetNames = meta.sheets.map(s => s.properties.title);

  // Step 2: fetch values for all tabs in one batch
  const ranges = sheetNames.map(n => encodeURIComponent(n));
  const valUrl = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values:batchGet?key=${apiKey}&ranges=${ranges.join('&ranges=')}`;
  const valRes = await fetch(valUrl);
  if (!valRes.ok) throw new Error(`HTTP ${valRes.status}: ${await valRes.text()}`);
  const val = await valRes.json();

  return sheetNames.map((name, i) => ({
    name,
    rows: (val.valueRanges[i].values || []),
  }));
}

// ── Render worksheets with sub-tabs ───────────────────────────────────────────
function renderWorksheets(containerId, worksheets, sheetId, sourceEl) {
  const container = document.getElementById(containerId);

  if (!worksheets.length) {
    container.innerHTML = '<div class="state-msg error-msg">No data found.</div>';
    return;
  }

  let html = '<div class="sheet-tabs">';
  worksheets.forEach((ws, i) => {
    html += `<button class="sheet-tab ${i===0?'active':''}" onclick="switchWorksheet(this, '${containerId}', ${i})">${ws.name}</button>`;
  });
  html += '</div>';

  worksheets.forEach((ws, i) => {
    html += `<div class="worksheet ${i===0?'active':''}" id="${containerId}-ws-${i}">`;
    html += renderTable(ws.rows);
    html += '</div>';
  });

  container.innerHTML = html;

  if (sourceEl) {
    sourceEl.innerHTML = `<a href="https://docs.google.com/spreadsheets/d/${sheetId}" target="_blank">↗ Open in Google Sheets</a>`;
  }
}

function switchWorksheet(btn, containerId, idx) {
  btn.closest('.tab-content').querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
  btn.closest('.tab-content').querySelectorAll('.worksheet').forEach(w => w.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${containerId}-ws-${idx}`).classList.add('active');
}

// ── Render a single table ──────────────────────────────────────────────────────
function renderTable(rows) {
  if (!rows.length) return '<div class="state-msg">No data in this tab.</div>';

  // Find max cols
  const maxCols = Math.max(...rows.map(r => r.length));

  let html = '<div class="table-wrap"><table class="sheet-table">';

  rows.forEach((row, ri) => {
    // Empty row
    if (!row || row.every(c => !c)) {
      html += '<tr class="row-empty"><td colspan="' + maxCols + '"></td></tr>';
      return;
    }

    const firstCell = (row[0] || '').toString().trim();

    // Detect row type
    const isHeader   = ri === 0 || isAllCaps(firstCell) && row.length <= 3 && !isNumeric(row[1]);
    const isTotal    = firstCell.toUpperCase().includes('TOTAL') || firstCell.toUpperCase().includes('WEEK TOTAL');
    const isSectionH = firstCell && row.length > 4 && ri === 0;

    let rowClass = '';
    if (isTotal)         rowClass = 'row-total';
    else if (isHeader && ri === 0) rowClass = 'row-header';

    const tag = (ri === 0) ? 'th' : 'td';
    html += `<tr class="${rowClass}">`;

    // Pad row to maxCols
    const padded = [...row];
    while (padded.length < maxCols) padded.push('');

    padded.forEach((cell, ci) => {
      const val = (cell || '').toString().trim();
      let cellClass = '';
      let cellContent = val;

      // Flag pills
      if (val === 'HIGH') cellContent = '<span class="flag flag-HIGH">HIGH</span>';
      else if (val === 'LOW') cellContent = '<span class="flag flag-LOW">LOW</span>';
      else if (val === 'OK') cellContent = '<span class="flag flag-OK">OK</span>';
      // Numbers right-align
      else if (isNumeric(val) && ci > 0) cellClass = 'num';
      // Percent
      else if (val.endsWith('%') && ci > 0) cellClass = 'num';

      html += `<${tag} class="${cellClass}">${cellContent}</${tag}>`;
    });

    html += '</tr>';
  });

  html += '</table></div>';
  return html;
}

function isNumeric(v) {
  if (!v) return false;
  return !isNaN(parseFloat(v.toString().replace(/[$,%]/g, '')));
}

function isAllCaps(s) {
  return s === s.toUpperCase() && s.length > 1 && /[A-Z]/.test(s);
}

// ── Last updated timestamp ─────────────────────────────────────────────────────
function setLastUpdated() {
  const now = new Date();
  const fmt = now.toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', timeZoneName: 'short',
    timeZone: 'America/New_York'
  });
  document.getElementById('last-updated').innerHTML =
    `<strong>Dashboard loaded</strong>${fmt}`;
}

// ── Error display ──────────────────────────────────────────────────────────────
function showError(containerId, err) {
  const msg = err.message || String(err);
  const isKey = msg.includes('400') || msg.includes('API key') || msg.includes('placeholder');

  document.getElementById(containerId).innerHTML = `
    <div class="state-msg error-msg">
      ${isKey
        ? '⚠ API key not configured — see setup instructions below.'
        : '⚠ Could not load data: ' + msg}
    </div>
    ${isKey ? setupInstructions() : ''}
  `;
}

function setupInstructions() {
  return `
    <div style="margin:24px 0 0; padding:24px; border:1px solid #3a443a; border-radius:2px; font-size:12px; line-height:1.8; color:var(--muted); max-width:600px;">
      <div style="color:var(--mint); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px;">Setup Required — One Time</div>
      <p>This dashboard uses the Google Sheets API to read your data. You need a free API key.</p>
      <br>
      <p><strong style="color:var(--text);">1.</strong> Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--mint);">console.cloud.google.com/apis/credentials</a></p>
      <p><strong style="color:var(--text);">2.</strong> Use your existing <code style="color:var(--text);">santo-taco-490100</code> project</p>
      <p><strong style="color:var(--text);">3.</strong> Click <strong style="color:var(--text);">+ Create Credentials → API Key</strong></p>
      <p><strong style="color:var(--text);">4.</strong> Restrict the key to "Google Sheets API" only</p>
      <p><strong style="color:var(--text);">5.</strong> Open this HTML file in a text editor, find the line <code style="color:var(--text);">const API_KEY = 'AIzaSyD-placeholder'</code> and replace the placeholder with your key</p>
      <br>
      <p style="color:#5a7458;">Your three sheets must be set to "Anyone with the link can view" — which you've already done.</p>
    </div>
  `;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function loadTab(key, containerId, linkId) {
  try {
    const { id } = SHEETS[key];
    const worksheets = await fetchSheet(id, API_KEY);
    renderWorksheets(containerId, worksheets, id, document.getElementById(linkId));
  } catch (err) {
    showError(containerId, err);
  }
}

async function init() {
  setLastUpdated();
  await Promise.all([
    loadTab('labor', 'labor-content', 'labor-link'),
    loadTab('cogs',  'cogs-content',  'cogs-link'),
    loadTab('menu',  'menu-content',  'menu-link'),
  ]);
}

init();
</script>
</body>
</html>
